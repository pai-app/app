name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install

      - run: npm run lint

      # Run unit tests (vitest). Fails CI on any test failure.
      - run: npm test

      # Type-check app + worker (composite project) and build the SPA bundle.
      - run: npm run build

      # Validate the Worker + assets config compiles and bundles without
      # contacting Cloudflare (no deploy).
      - run: npx wrangler deploy --dry-run
